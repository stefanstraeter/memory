<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="public/img/00_general/favicon.svg" />
    <title>Memory Game</title>
  </head>

  <body data-theme="code-vibes">
    <div id="app">
      <section id="screen-home" class="screen home">
        <div class="home__content">
          <span class="home__subtitle">It's time to play</span>
          <h1 class="home__title">Ready to play?</h1>

          <div class="home__actions">
            <button class="btn btn--primary btn--large">
              <img src="/img/00_general/stadia_controller.png" class="btn__icon" />
              Play
              <span class="btn__arrow"></span>
            </button>
          </div>
        </div>
        <img src="/img/00_general/stadia_controller_yellow.png" class="home__controller" alt="" />
      </section>

      <section id="screen-settings" class="screen settings u-hidden">
        <div class="settings__container">
          <h2 class="settings__title">Settings</h2>
          <div class="settings__group"></div>
          <button id="btn-start-game" class="btn btn--primary btn--large">Start Game</button>
        </div>
      </section>

      <section id="screen-game" class="screen game u-hidden">
        <header class="game__header"></header>
        <div class="game__board">
          <div id="memory-grid" class="game-board__grid"></div>
        </div>
      </section>

      <section id="screen-gameover" class="screen gameover u-hidden">
        <div class="gameover__content">
          <h2 class="gameover__title">GAME OVER</h2>
          <button id="btn-see-results" class="btn btn--primary btn--large">See Results</button>
        </div>
      </section>

      <section id="screen-result" class="screen result u-hidden">
        <div class="result__card">
          <h2 class="result__title">The Winner is...</h2>
          <div class="result__winner-info">
            <img src="/img/00_general/pockal.png" alt="Winner" class="result__icon" />
            <p class="result__player-name">Orange Player</p>
          </div>
          <button id="btn-restart" class="btn btn--primary">Play Again</button>
        </div>
      </section>
    </div>
  </body>

  <script type="module" src="/src/main.ts"></script>
</html>
