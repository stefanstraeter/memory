<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="public/img/00_general/favicon.svg" />
    <title>Memory Game</title>
  </head>

  <body data-theme="code-vibes">
    <div id="app">
      <section id="screen-start" class="screen">
        <div class="screen__content">
          <h1 class="screen__title">Ready to play?</h1>
          <h4 class="screen__subtitle">It's time to play</h4>
          <button id="btn-to-settings" class="btn btn--primary">Play</button>
        </div>
      </section>

      <section id="screen-settings" class="screen screen--hidden">
        <div class="settings">
          <h2 class="settings__title">Settings</h2>
          <div class="settings__group">
            <p class="settings__label">Theme</p>
            <div class="settings__options"></div>
          </div>
          <button id="btn-start-game" class="btn btn--primary">Start Game</button>
        </div>
      </section>

      <section id="screen-game" class="screen screen--hidden">
        <div class="game-board">
          <div id="memory-grid" class="game-board__grid"></div>
        </div>
      </section>

      <section id="screen-result" class="screen screen--hidden">
        <div class="result">
          <h2 class="result__title">Game Over</h2>
          <div class="result__winner">
            <img src="/img/00_general/pockal.png" class="result__icon" alt="Winner" />
            <p class="result__text">Blue Player wins!</p>
          </div>
          <button class="btn btn--primary">Play Again</button>
        </div>
      </section>
    </div>
  </body>

  <script type="module" src="/src/main.ts"></script>
</html>
